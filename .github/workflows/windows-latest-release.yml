name: Windows Latest Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-latest-release
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        run: npm run make -- --platform=win32 --arch=x64

      - name: Move latest tag to current commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = "tags/latest";
            const sha = context.sha;

            try {
              await github.rest.git.getRef({ owner, repo, ref });
              await github.rest.git.updateRef({
                owner,
                repo,
                ref,
                sha,
                force: true
              });
              core.info(`Updated ${ref} to ${sha}`);
            } catch (error) {
              if (error.status === 404) {
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/${ref}`,
                  sha
                });
                core.info(`Created ${ref} at ${sha}`);
              } else {
                throw error;
              }
            }

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Windows Build
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: false
          make_latest: true
          overwrite_files: true
          files: |
            out/make/squirrel.windows/x64/*.exe
            out/make/squirrel.windows/x64/*.nupkg
            out/make/squirrel.windows/x64/RELEASES
